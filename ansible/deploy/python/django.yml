# Inputs:
#   app: The name of the application to deploy (e.g., "my-nest-app").
#   app_user: The user on the remote server that owns the application files (e.g., "www-data").
#   artifact: The path to the build artifact (e.g., "/tmp/artifact/my-nest-app-build.tar.gz").
#   runtime_commands
---
- name: Deploy django
  hosts: all
  become: true
  become_user: "{{ app_user }}"

  vars:
    app_dir: "/var/www/{{ app }}"
    venv_python: "{{ app_dir }}/.venv/bin/python"
    ansible_remote_tmp: /tmp/.ansible/tmp

  tasks:
    - name: Upload build artifact
      block:
        - name: Copy archive to remote
          ansible.builtin.copy:
            src: "{{ artifact }}"
            dest: "/tmp/{{ app }}-build.tar.gz"
            mode: "0644"

        - name: Extract project
          ansible.builtin.unarchive:
            src: "/tmp/{{ app }}-build.tar.gz"
            dest: "{{ app_dir }}"
            remote_src: true
            exclude:
              - ./.venv
      always:
        - name: Clean up uploaded archive
          ansible.builtin.file:
            path: "/tmp/{{ app }}-build.tar.gz"
            state: absent

    - name: Install requirements (creates venv if missing)
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/.venv"
        virtualenv_command: python3 -m venv

    - name: Collect static files
      ansible.builtin.command:
        cmd: "{{ venv_python }} manage.py collectstatic --noinput"
        chdir: "{{ app_dir }}"
      register: static_collect_result
      changed_when: "'0 static files copied to' not in static_collect_result.stdout"

    - name: Compress static files
      ansible.builtin.command:
        cmd: "{{ venv_python }} manage.py compress"
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Delete staticfiles directory
      ansible.builtin.file:
        path: "{{ app_dir }}/staticfiles"
        state: absent

    - name: Migrate database
      ansible.builtin.command:
        cmd: "{{ venv_python }} manage.py migrate --noinput"
        chdir: "{{ app_dir }}"
      register: migrate_result
      changed_when: "'No migrations to apply' not in migrate_result.stdout"

    - name: Build runtime command list
      ansible.builtin.set_fact:
        runtime_commands_list: "{{ runtime_commands | default('') | split(';') | map('trim') | map('regex_replace', '^sudo\\s+', '') | reject('equalto', '') | list }}"

    - name: Execute runtime commands on the server
      when: runtime_commands_list | length > 0
      ansible.builtin.shell: "{{ item }}"
      loop: "{{ runtime_commands_list }}"
      become: true
      become_user: root
