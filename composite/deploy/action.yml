inputs:
  ecs_cluster:
    type: string
    description: The name of the ECS cluster
    required: true

  ecs_service:
    type: string
    description: The name of the ECS service to update
    required: true

  image_uri:
    type: string
    description: The full image URI to deploy, including the tag (e.g., `123456789012.dkr.ecr.us-west-2.amazonaws.com/my-app:latest`)
    required: true

  ctnr_command:
    type: string
    description: semicolon delimited list of commands to run in the container
    required: true

  enable_maintenance_mode:
    type: boolean
    description: Whether to enable maintenance mode before deployment and disable it after deployment.
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Print input parameters (Debug)
      shell: bash
      run: |
        echo "ECS Cluster: ${{ inputs.ecs_cluster }}"
        echo "ECS Service: ${{ inputs.ecs_service }}"
        echo "Image URI: ${{ inputs.image_uri }}"
        echo "Container Command: ${{ inputs.ctnr_command }}"
        echo "Enable Maintenance Mode: ${{ inputs.enable_maintenance_mode }}"

    - name: Check if service is already being updated
      shell: bash
      run: |
        CURRENT_ECS_SERVICE_ROLLOUT_STATE=$(aws ecs describe-services --cluster "${{ inputs.ecs_cluster }}" --services "${{ inputs.ecs_service }}" | jq -re '.services[0].deployments[0].rolloutState')
        if [ "$CURRENT_ECS_SERVICE_ROLLOUT_STATE" == "IN_PROGRESS" ]; then
            echo >&2 "Service is already being updated, exiting."
            exit 1
        fi

    # TODO: Use double dash args
    - name: Update ECS service only if image tag has changed
      env:
        PYTHONUNBUFFERED: 1  # Without this env var, prints are not visible real-time in gh actions
      shell: bash
      run: |
        python3 $GITHUB_ACTION_PATH/deploy.py "${{ inputs.ecs_cluster }}" "${{ inputs.ecs_service }}" "${{ inputs.image_uri }}" "${{ inputs.enable_maintenance_mode }}" "${{ inputs.ctnr_command }}"
