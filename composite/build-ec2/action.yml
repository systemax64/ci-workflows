---
name: Step to build the application for deployment to EC2
description: This step builds the application for deployment to EC2. It supports different build tools, such as npm, and can be extended to support other build tools in the future.

inputs:
  build_tool:
    description: The build tool to use for building the application (e.g., 'npm', 'maven', etc.). Currently, only 'npm' is supported.
    required: true
  build_args:
    description: "Optional build arguments to pass to the build tool (e.g., node_version)."
    required: false
    default: "{}"

runs:
  using: composite
  steps:
    - name: Validate build input and output build arguments
      id: prepare
      shell: bash
      run: |
        if [[ ! "${{ inputs.build_tool }}" =~ ^(npm|pip)$ ]]; then
          echo "Error: Unsupported build tool '${{ inputs.build_tool }}'."
          exit 1
        fi

        BUILD_ARGS='${{ inputs.build_args }}'

        # Validate JSON format
        if ! echo "$BUILD_ARGS" | jq -e . > /dev/null 2>&1; then
          echo "::warning::Invalid JSON provided for build_args input: $BUILD_ARGS"
          exit 0
        fi

        if [[ "${{ inputs.build_tool }}" == "npm" ]]; then
          NODE_VERSION=$(echo $BUILD_ARGS | jq -r '.node_version')
          if [[ -z "$NODE_VERSION" ]]; then
            echo "::warning:: Node.js version not specified in build_args. Defaulting to the latest available version."
            echo "node_version=''" >> $GITHUB_OUTPUT
          else
            echo "[DEBUG] Resolved Node.js version: $NODE_VERSION"
            echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
        fi

        if [[ "${{ inputs.build_tool }}" == "pip" ]]; then
          PYTHON_VERSION=$(echo $BUILD_ARGS | jq -r '.python_version')
          if [[ -z "$PYTHON_VERSION" ]]; then
            echo "::warning::Python version not specified in build_args. Defaulting to the latest available version."
            echo "python_version=''" >> $GITHUB_OUTPUT
          else
            echo "[DEBUG] Resolved Python version: $PYTHON_VERSION"
            echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          fi
        fi

        echo "Build tool and arguments validated successfully."

    - name: Setup node
      if: ${{ inputs.build_tool == 'npm' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ steps.prepare.outputs.node_version }}
    - name: Install node modules
      if: ${{ inputs.build_tool == 'npm' }}
      shell: bash
      run: npm install
    - name: Build
      shell: bash
      if: ${{ inputs.build_tool == 'npm' }}
      run: npm run build

    - name: Install python prerequisites
      if: ${{ inputs.build_tool == 'pip' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config default-libmysqlclient-dev build-essential
    - name: Set up Python
      if: ${{ inputs.build_tool == 'pip' }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ steps.prepare.outputs.python_version }}
        cache: 'pip'
    - name: Install python dependencies
      if: ${{ inputs.build_tool == 'pip' }}
      shell: bash
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
